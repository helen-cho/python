<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <script src="http://code.jquery.com/jquery-1.9.1.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        th, td {
            text-align: center;
        }

        * {
            font-family: "Jua", sans-serif;
            font-weight: 400;
            font-style: normal;
        }
    </style>
    <title>공공의료기관현황</title>
</head>
<body>
    <div class="container m-5">
        <h1 class="text-center mb-3">공공의료기관현황</h1>
        <div id="health"></div>
        <div class="text-center">
            <button class="btn btn-primary px-5" id="pre">이전</button>
            <span class="px-3" id="page">1/10</span>
            <button class="btn btn-primary px-5" id="next">다음</button>
        </div>
    </div>
</body>
<script>
    getData();
    function getData(){
        $.ajax({
            type:"get",
            url:"/health/data",
            success:function(data){
                $("#health").html(data.table);
                const count=data.count;
                const total = Math.ceil(count/10);
                $("#page").html(total)
            }
        })
    }
</script>
</html>
