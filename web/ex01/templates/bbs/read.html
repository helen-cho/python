<div class="my-5 px-5">
  <h1 class="text-center mb-5">{{title}}</h1>
  <div class="card">
    <div class="card-body">
      <h5>[{{bbs.bid}}] {{bbs.title}}</h5>
      <hr>
      <div style="white-space:pre-wrap;">{{bbs.contents}}</div>
    </div>
    <div class="card-footer text-muted py-3">
      Posted by {{bbs.writer}} on {{bbs.fmtDate}}
    </div>
  </div>
</div>
