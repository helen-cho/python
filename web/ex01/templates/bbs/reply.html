<div class="my-5">
  <h3 class="text-center mb-3">댓글관리</h3>
  <div>
    <textarea id="contents" class="form-control" rows="5" placeholder="댓글내용을 입력하세요."></textarea>
    <div class="text-end mt-2 mb-5">
      <button id="insert" class="btn btn-primary px-5">등록</button>
    </div>
  </div>
  <div id="div_list"></div>
  <div id="pagination" class="pagination justify-content-center mt-5"></div>
  {%raw%}
  <script id="temp_list" type="x-handlebars-template">
    {{#each list}}
      <div>
        <div class="text-muted" style="font-size:13px;">
          {{writer}} | {{fmtDate}}
        </div>  
        <div style="cursor:pointer;white-space:pre-wrap" 
                  class="ellipsis contents">{{contents}}</div>  
        <hr>
      </div>  
    {{/each}}
  </script>
  {%endraw%}
</div>
<script>
  let page=1;
  let totalPages=100;
  let size=3;

  $("#div_list").on("click", ".contents", function(){
    $(this).toggleClass("ellipsis")
  });

  getList();
  function getList(){
    $.ajax({
      type:"get",
      data:{page, size},
      url:`/reply/list.json/${bid}`,
      success:function(data){
        //console.log(data);
        const temp=Handlebars.compile($("#temp_list").html());
        $("#div_list").html(temp(data));
        const curPages = data.total == 0 ? 1:Math.ceil(data.total/size);

        if(data.total > size) {
          $("#pagination").show();
        }else{
          $("#pagination").hide();
        }

        if(curPages != totalPages){
          totalPages = curPages;
          $("#pagination").twbsPagination("changeTotalPages", totalPages, page);
        }
      }
    });
  }

  $("#insert").on("click", ()=>{
    if(!uid){
      sessionStorage.setItem("target", `/bbs/${bid}`);
      location.href="/users/login";
    }
    const contents = $("#contents").val();
    if(contents == "") {
      alert("댓글내용을 입력하세요!");
      $("#contents").focus();
      return;
    }
    //댓글등록
    $.ajax({
      type:"post",
      url:"/reply/insert",
      data:JSON.stringify({bid, uid, contents}),
      success:function(data){
        if(data=='success') {
          getList();
          $("#contents").val("");
        }
      }
    });
  });

  $('#pagination').twbsPagination({
    totalPages:totalPages,
    visiblePages: 5,
    startPage : 1,
    initiateStartPageClick: false,
    first:'<<',
    prev :'<',
    next :'>',
    last :'>>',
    onPageClick: function (event, clickedPage) {
      if(page != clickedPage) {
        page=clickedPage; 
        getList();
      }
    }
  });
</script>
